# Token Optimizer — full stack via docker compose.
#
# Default services (Mac & most setups):
#   1. app    — frontend (vite) + backend (FastAPI), one container, port 8000
#   2. db     — PostgreSQL 16 for durable storage
#   3. cache  — Redis 7 for prompt-result caching
#
# The LLM (Ollama) runs NATIVELY ON THE HOST, not in a container — on macOS
# the Apple GPU can't be passed into Docker, so a containerised Ollama would
# be CPU-only and painfully slow. The app reaches the host's Ollama via
# OLLAMA_API_URL=http://host.docker.internal:11434 (set in .env.docker).
#
# Optional 4th service:
#   ollama  — in-container LLM, behind `--profile with-ollama`. Only worth
#             it on Linux/NVIDIA hosts where the container CAN use the GPU.
#
# Quick start (Mac):
#     # 1. Run Ollama on the host and pull the model:
#     ollama serve &
#     ollama pull qwen2.5-coder:7b
#     # 2. Configure and launch the stack:
#     cp .env.docker.example .env.docker      # set model + host.docker.internal URL
#     docker compose --env-file .env.docker up --build
#
# Then open http://localhost:8000 for the web UI.

services:
  # ───────────────────────────────────── App: frontend + backend
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: adaptora-app:latest
    container_name: adaptora-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:8000"
      - "${HTTP_PORT:-8080}:8080"
    # User-editable config (OLLAMA_MODEL, API keys, etc.) is read from
    # .env.docker. Unlike `${VAR}` substitution below — which only reads
    # the auto-loaded `.env` — env_file injects these straight into the
    # container, so editing .env.docker is enough to change the model.
    # `required: false` keeps `compose up` working if the file is absent.
    env_file:
      - path: .env.docker
        required: false
    environment:
      # OLLAMA_API_URL comes from .env.docker (single source of truth).
      #   • Mac / native Ollama on the host (default):
      #       OLLAMA_API_URL=http://host.docker.internal:11434
      #     The app reaches the host's GPU-accelerated Ollama. No `ollama`
      #     container runs — Docker Desktop on Mac can't pass the Apple
      #     GPU into containers, so in-container Ollama would be CPU-only.
      #   • Linux / NVIDIA host wanting an all-in-one stack:
      #       OLLAMA_API_URL=http://ollama:11434
      #     and bring the optional service up with `--profile with-ollama`.
      # The fallback below only applies if .env.docker doesn't set it.
      OLLAMA_API_URL: ${OLLAMA_API_URL:-http://host.docker.internal:11434}
      REDIS_URL: redis://cache:6379/0
      CACHE_TYPE: redis
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-tokopt}:${POSTGRES_PASSWORD:-tokopt}@db:5432/${POSTGRES_DB:-tokopt}
      SECRET_KEY: ${SECRET_KEY:-please-change-me-in-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # Optional API keys — pass through from .env.docker if set.
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GOOGLE_CSE_ID: ${GOOGLE_CSE_ID:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OLLAMA_API_KEY: ${OLLAMA_API_KEY:-}
      OAUTH_REDIRECT_BASE_URL: ${OAUTH_REDIRECT_BASE_URL:-}
      ENABLE_HTTPS: ${ENABLE_HTTPS:-false}
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
      # NOTE: no dependency on `ollama`. By default the app talks to a
      # native Ollama on the host (http://host.docker.internal:11434),
      # which isn't a compose service. The optional in-container `ollama`
      # service (profile: with-ollama) is only for Linux/GPU hosts.

  # ───────────────────────────────────── Database
  db:
    image: postgres:16-alpine
    container_name: adaptora-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tokopt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tokopt}
      POSTGRES_DB: ${POSTGRES_DB:-tokopt}
    # Persist DB across container recreates. Named volume = managed by
    # docker; survives `compose down`, removed by `compose down -v`.
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tokopt} -d ${POSTGRES_DB:-tokopt}"]
      interval: 5s
      timeout: 3s
      retries: 10
    # Expose to host only if explicitly opted-in via .env.docker —
    # cluster-internal access via the `db` hostname doesn't need this.
    ports:
      - "${DB_PORT:-5432}:5432"

  # ───────────────────────────────────── Cache
  cache:
    image: redis:7-alpine
    container_name: adaptora-cache
    restart: unless-stopped
    # `--save ""` disables RDB snapshots — this cache is ephemeral and
    # losing it on restart is fine; the app re-fills on demand. Avoids
    # the periodic disk-write spikes that Redis's default config has.
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    ports:
      - "${CACHE_PORT:-6379}:6379"

  # ───────────────────────────────────── Ollama (local LLM)
  ollama:
    # OPTIONAL — only starts with `--profile with-ollama`. Intended for
    # Linux / NVIDIA hosts where a container CAN use the GPU. On macOS the
    # Apple GPU is NOT available inside Docker, so this would run CPU-only
    # and be very slow (~100s/call for 7b); Mac users should run Ollama
    # natively on the host instead and leave this profile off.
    profiles: ["with-ollama"]
    build:
      context: .
      dockerfile: docker/ollama/Dockerfile
    image: adaptora-ollama:latest
    container_name: adaptora-ollama
    restart: unless-stopped
    # Same .env.docker as the app, so the model the daemon pulls and the
    # model the app requests always stay in sync from a single source.
    env_file:
      - path: .env.docker
        required: false
    # Mount /root/.ollama so the downloaded model persists across
    # container recreates — re-pulling a 2GB model on every restart is
    # both slow and a great way to get rate-limited.
    volumes:
      - ollama-models:/root/.ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    # Long start period: first run pulls the model (~2 GB). Once the
    # named volume has the model, subsequent starts settle in seconds.
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 300s
    # If you have an NVIDIA GPU on the host and the nvidia-container-toolkit
    # installed, uncomment the block below for ~10× faster inference.
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

volumes:
  db-data:
  ollama-models:
